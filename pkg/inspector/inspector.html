
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
</head>
<body>
<h1>WebSocket Client</h1>
<p id="origin-hint" style="display:none;color:#666;font-size:14px">
  Open this UI from the inspector server (e.g. <code>http://127.0.0.1:4040/</code>) so WebSocket and <code>/logs</code> work.
  If you opened this file directly, we assume <code>http://127.0.0.1:4040</code> unless you add <code>?port=9090</code> to the file URL.
</p>
<div>
    <div id="logs" class="logs-container">
        <ul id="logsList" class="logs-list">
            <li>
                <span class="method">GET</span>
                <span class="path">/</span>
                <span class="response-time">100ms</span>
                <span class="status-code">200</span>
            </li>
        </ul>  
        
    </div> 
    <div id="request-form" class="request-form" style="white-space:pre-wrap;font-family:monospace;font-size:12px;border:1px solid #ccc;padding:8px;margin-top:8px;min-height:4em"></div>
    <div id="response-form" class="response-form" style="white-space:pre-wrap;font-family:monospace;font-size:12px;border:1px solid #ccc;padding:8px;margin-top:8px;min-height:4em"></div>
</div>
<div id="messages"></div>

<script>
    let ws;

    loglist=document.getElementById("logsList");
    /**
     * Base URL for the inspector HTTP server.
     * When you open this page as file://, location.host is empty and relative /ws and /logs break.
     * Fix: open http://127.0.0.1:PORT/ from the standalone inspector (go run ./cmd/inspector), or file:///.../inspector.html?port=4040
     */
    function inspectorHTTPBase() {
        if (location.host) {
            return location.protocol + '//' + location.host;
        }
        var port = new URLSearchParams(location.search).get('port') || '4040';
        return 'http://127.0.0.1:' + port;
    }

    function connect() {
        var base = inspectorHTTPBase();
        var wsProto = base.indexOf('https:') === 0 ? 'wss:' : 'ws:';
        var host = base.replace(/^https?:\/\//, '');
        var wsURL = wsProto + '//' + host + '/ws';
        ws = new WebSocket(wsURL);


        ws.onopen = function() {
            fetch(base + '/logs').then(response => response.json()).then(logs => {
                console.log("logs", logs);
                var list = document.getElementById("logsList");
                if (list) list.innerHTML = "";
                logs.forEach(log => {
                    updateLogsUI(log);
                });
            });
            console.log("Connected to WebSocket server");
        };

        ws.onmessage = function(event) {
            var msg = JSON.parse(event.data);
            // Matches inspector viewer JSON: eventType + payload (see logstore.RequestEvent).
            switch (msg.eventType) {
                case "request":
                updateLogsUI(msg.payload);
                break;
                case "response":
                    updateLogsUI(msg.payload);
                    break;
                default:
                    console.warn("unknown eventType", msg.eventType);
            }
        };

        ws.onclose = function() {
            console.log("WebSocket connection closed, retrying...");
            setTimeout(connect, 1000); // Reconnect after 1 second
        };

        ws.onerror = function(error) {
            console.error("WebSocket error:", error);
        };
    }

    function sendMessage() {
        var input = document.getElementById("messageInput");
        if (!ws || ws.readyState !== WebSocket.OPEN || !input) return;
        ws.send(input.value || "");
        input.value = "";
    }

    function escapeHtml(s) {
        if (s == null || s === undefined) return "";
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function updateLogsUI(log) {
        if (!log) return;
        var logsList = document.getElementById("logsList");
        if (!logsList) return;
        var req = log.request || {};
        var res = log.response || {};
        var li = document.createElement("li");
        li.setAttribute("data-id", log.id);
        li.innerHTML =
            '<span class="method">' + escapeHtml(req.method) + '</span>' +
            '<span class="path">' + escapeHtml(req.path) + '</span>' +
            '<span class="response-time">' + escapeHtml(res.durationMs) + 'ms</span>' +
            '<span class="status-code">' + escapeHtml(res.statusCode) + '</span>';

        li.onclick = function(e) {
            e.preventDefault();
            var id = e.currentTarget.getAttribute("data-id");
            if (!id) return;
            fetch(inspectorHTTPBase() + '/log?id=' + encodeURIComponent(id))
                .then(function(r) { return r.json(); })
                .then(function(entry) {
                    console.log(entry);
                    var reqEl = document.getElementById("request-form");
                    var resEl = document.getElementById("response-form");
                    if (reqEl) reqEl.textContent = JSON.stringify(entry.request, null, 2);
                    if (resEl) resEl.textContent = JSON.stringify(entry.response, null, 2);
                });
        };
        loglist.appendChild(li);
    }
    if (!location.host) {
        document.getElementById('origin-hint').style.display = 'block';
    }
    connect();
</script>
</body>
</html>
